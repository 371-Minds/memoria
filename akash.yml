version: "2.0"
services:
  memoria:
    image: your-docker-repo/memoria:latest
    expose:
      - port: 3000
        as: 80
        to:
          - global: true
    env:
      # Removed CLICKHOUSE_HOST to force the hyper-thin local JSON store
      - NEXT_PUBLIC_GEMINI_API_KEY=your_gemini_api_key
      - MEMORIA_API_KEY=your_secret_key
profiles:
  compute:
    memoria:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 512Mi
        storage:
          size: 1Gi
  placement:
    dcloud:
      pricing:
        memoria:
          denom: uakt
          amount: 1000
deployment:
  memoria:
    dcloud:
      profile: memoria
      count: 1
